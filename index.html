<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logística Pro V5.6 - Precisión Total</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --border: #d1d5db;
            --input-bg: #ffffff;
            --accent: #2563eb;
        }
        .dark {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --border: #4b5563;
            --input-bg: #374151;
            --accent: #3b82f6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            transition: background 0.3s;
            margin: 0;
            padding-top: env(safe-area-inset-top);
        }

        .tab-content {
            display: none;
            height: calc(100vh - 80px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 100px;
        }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid var(--border);
            z-index: 50;
        }
        .nav-item {
            text-align: center;
            font-size: 10px;
            color: #9ca3af;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-item.active { color: var(--accent); }

        textarea, input, select {
            background-color: var(--input-bg) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            outline: none;
            border-radius: 12px;
        }

        /* CORRECCIÓN DE LA BASE GRUPAL */
        #base-display {
            background-color: var(--input-bg) !important;
            color: var(--text) !important;
            border: 1px solid var(--border);
        }

        .tipo-camion { border-left: 6px solid #ef4444 !important; }
        .cronos { font-variant-numeric: tabular-nums; }

        .badge-last {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body onclick="activarAudioSilent()">

    <div id="tab1" class="tab-content active">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-blue-500 uppercase text-xs tracking-widest">Bloc de Notas</h2>
            <button onclick="descargarNotas()" class="text-gray-400 text-xs"><i class="fas fa-download"></i> TXT</button>
        </div>
        <textarea id="notas-input" class="w-full h-[70vh] p-4 text-sm shadow-inner" placeholder="Escribe aquí..."></textarea>
    </div>

    <div id="tab2" class="tab-content">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h2 class="font-bold text-blue-600">Base Grupal</h2>
                <span id="sync-status" class="text-[9px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold">CARGANDO...</span>
            </div>
            <button onclick="fetchCloudData()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div id="base-display" class="p-4 rounded-xl font-mono text-[11px] whitespace-pre-wrap overflow-y-auto h-[60vh]">Conectando...</div>
    </div>

    <div id="tab3" class="tab-content">
        <h2 class="font-bold mb-4 text-center uppercase text-xs text-gray-400 tracking-widest">Ajustes</h2>
        <div class="flex gap-2 mb-6">
            <input id="input-ruta" type="text" placeholder="Ej: RUTA 10" class="flex-1 p-3 text-sm font-bold">
            <button onclick="addRuta()" class="bg-green-600 text-white px-6 rounded-xl font-bold shadow-md">+</button>
        </div>
        
        <div class="card flex items-center justify-between">
            <span class="text-sm font-bold uppercase">Modo Nocturno</span>
            <input type="checkbox" id="dark-toggle" onchange="toggleDark()" class="w-6 h-6">
        </div>

        <div id="lista-rutas-config" class="mt-4"></div>

        <div class="mt-8 p-4 border border-red-200 rounded-2xl bg-red-50 dark:bg-red-900/10">
            <h3 class="text-red-500 font-bold text-xs uppercase mb-2">Seguridad</h3>
            <button onclick="exportarBackup()" class="w-full bg-gray-600 text-white p-2 rounded-lg text-xs font-bold mb-2">Exportar Backup (JSON)</button>
            <button onclick="borrarTodo()" class="w-full bg-red-100 text-red-600 p-2 rounded-lg text-xs font-bold">Limpiar Historial</button>
        </div>
    </div>

    <div id="tab4" class="tab-content">
        <div id="panel-tiempos" class="space-y-3"></div>
    </div>

    <div id="tab5" class="tab-content">
        <div class="flex flex-col gap-3 mb-6">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-blue-600 uppercase text-xs">Historial</h2>
                <button onclick="copyWA()" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-md">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="calendar-filter" onchange="renderReportes()" class="p-2 text-xs font-bold">
                <select id="ruta-filter" onchange="renderReportes()" class="p-2 text-xs font-bold"></select>
            </div>
        </div>
        <div id="lista-reportes" class="space-y-2"></div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-item active" onclick="go(1)"><i class="fas fa-edit fa-lg"></i><span>Notas</span></div>
        <div class="nav-item" onclick="go(2)"><i class="fas fa-cloud fa-lg"></i><span>Base</span></div>
        <div class="nav-item" onclick="go(3)"><i class="fas fa-cog fa-lg"></i><span>Ajustes</span></div>
        <div class="nav-item" onclick="go(4)"><i class="fas fa-stopwatch fa-lg"></i><span>Tiempos</span></div>
        <div class="nav-item" onclick="go(5)"><i class="fas fa-list-ol fa-lg"></i><span>Reporte</span></div>
    </nav>

    <script>
        const GID = "befb4b7fbbbd04b9406f0b0b3fe6bbfe";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioHabilitado = false;
        
        let rutas = JSON.parse(localStorage.getItem('log_rutas')) || [];
        let historial = JSON.parse(localStorage.getItem('log_hist')) || {};
        let tabActual = 1;

        function getFechaLocal() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function activarAudioSilent() { 
            if (!audioHabilitado && audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => audioHabilitado = true);
            }
        }

        function bip(tiempo) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; osc.frequency.setValueAtTime(1100, tiempo);
                gain.gain.setValueAtTime(0, tiempo);
                gain.gain.linearRampToValueAtTime(0.8, tiempo + 0.02);
                gain.gain.linearRampToValueAtTime(0, tiempo + 0.18);
                osc.start(tiempo); osc.stop(tiempo + 0.2);
            } catch(e) {}
        }

        function sonarPatron() {
            if (!audioHabilitado) return;
            const t = audioCtx.currentTime;
            for(let i=0; i<4; i++) bip(t + (i*0.25));
        }

        function save() {
            localStorage.setItem('log_rutas', JSON.stringify(rutas));
            localStorage.setItem('log_hist', JSON.stringify(historial));
            render();
        }

        function toggleDark() {
            document.body.classList.toggle('dark');
            localStorage.setItem('log_dark', document.body.classList.contains('dark'));
        }

        function addRuta() {
            let n = document.getElementById('input-ruta').value.trim();
            if(n) { 
                rutas.push({n: n.toUpperCase(), alarm: 15, on: true}); 
                document.getElementById('input-ruta').value=''; 
                save(); 
            }
        }

        function deleteRuta(idx) {
            const nombre = rutas[idx].n;
            if(confirm(`¿Borrar "${nombre}"? Se perderán sus datos históricos.`)) {
                rutas.splice(idx, 1);
                for (let f in historial) historial[f] = historial[f].filter(reg => reg.ruta !== nombre);
                save();
            }
        }

        function regPase(idx) {
            let unid = document.getElementById(`unit-${idx}`).value;
            let tipo = document.getElementById(`tipo-${idx}`).value;
            if(!unid) return;
            const hoy = getFechaLocal();
            if (!historial[hoy]) historial[hoy] = [];
            historial[hoy].push({ ruta: rutas[idx].n, unidad: unid, tipo: tipo, time: Date.now() });
            document.getElementById(`unit-${idx}`).value = '';
            save();
        }

        function undo(idxGlob) {
            const f = document.getElementById('calendar-filter').value;
            if(confirm("¿Eliminar registro?")) { historial[f].splice(idxGlob, 1); save(); }
        }

        function go(t) {
            activarAudioSilent();
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab'+t).classList.add('active');
            document.querySelectorAll('.nav-item')[t-1].classList.add('active');
            tabActual = t;
            if(t === 2) fetchCloudData();
            if(t === 4 || t === 5) render();
        }

        function render() {
            const hoy = getFechaLocal();
            document.getElementById('lista-rutas-config').innerHTML = rutas.map((r,i) => `
                <div class="card flex flex-col gap-2">
                    <div class="flex justify-between font-bold text-blue-600"><span>${r.n}</span>
                    <button onclick="deleteRuta(${i})" class="text-red-400"><i class="fas fa-trash-alt"></i></button></div>
                    <div class="flex items-center gap-3 text-xs">
                        Min. Alerta: <input type="number" value="${r.alarm}" onchange="rutas[${i}].alarm=parseInt(this.value);save()" class="w-12 border rounded px-1 text-center font-bold">
                        <button onclick="rutas[${i}].on=!rutas[${i}].on;save()" class="ml-auto text-lg ${r.on?'text-blue-500':'text-gray-300'}"><i class="fas ${r.on?'fa-bell':'fa-bell-slash'}"></i></button>
                    </div>
                </div>
            `).join('');

            document.getElementById('panel-tiempos').innerHTML = rutas.map((r,i) => {
                let regs = (historial[hoy] || []).filter(x => x.ruta === r.n);
                let last = regs[regs.length - 1];
                return `
                    <div class="card ${last && last.tipo === 'Camión' ? 'tipo-camion' : ''}">
                        <div class="flex justify-between items-start mb-4">
                            <div><span class="font-black text-xl uppercase">${r.n}</span>
                            ${last ? `<div class="mt-1"><span class="badge-last">#${last.unidad}</span></div>` : ''}</div>
                            <span class="cronos font-mono text-3xl font-black text-gray-400" data-last="${last?last.time:''}" data-alarm="${r.alarm}" data-on="${r.on}">00:00</span>
                        </div>
                        <div class="flex gap-2">
                            <input id="unit-${i}" type="number" placeholder="ID" class="w-20 p-3 rounded-xl text-sm font-bold shadow-inner">
                            <select id="tipo-${i}" class="flex-1 p-3 rounded-xl text-xs font-bold"><option>Combi</option><option>Camión</option></select>
                            <button onclick="regPase(${i})" class="bg-blue-600 text-white px-6 rounded-xl font-bold shadow-lg">OK</button>
                        </div>
                    </div>
                `;
            }).join('');

            const sR = document.getElementById('ruta-filter');
            const v = sR.value;
            sR.innerHTML = rutas.map(r => `<option value="${r.n}">${r.n}</option>`).join('');
            if(v) sR.value = v;
            renderReportes();
        }

        function renderReportes() {
            const rSel = document.getElementById('ruta-filter').value;
            const f = document.getElementById('calendar-filter').value;
            const filtrados = (historial[f] || []).map((r, i) => ({ ...r, oIdx: i })).filter(r => r.ruta === rSel);
            
            document.getElementById('lista-reportes').innerHTML = filtrados.slice().reverse().map((r, i, arr) => {
                const sig = arr[i+1]; 
                let freq = "---";
                if (sig) {
                    const diffS = Math.floor((r.time - sig.time) / 1000);
                    const mm = Math.floor(diffS / 60);
                    const ss = diffS % 60;
                    freq = `${mm}m ${ss}s`;
                }
                return `<div class="card p-3 flex justify-between items-center text-[11px]">
                    <div>
                        <span class="font-black text-blue-600 text-sm">#${r.unidad}</span> | <b>${new Date(r.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</b>
                        <div class="mt-1 opacity-50 font-bold uppercase text-[9px]">Freq: ${freq} | ${r.tipo}</div>
                    </div>
                    <button onclick="undo(${r.oIdx})" class="text-gray-300 p-2"><i class="fas fa-undo-alt"></i></button>
                </div>`;
            }).join('') || "<p class='text-center opacity-30 mt-10 text-[10px] font-bold'>SIN DATOS</p>";
        }

        async function fetchCloudData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GID}?nocache=${Date.now()}`);
                const d = await res.json();
                if(d.files && d.files["base_logistica.txt"]) {
                    document.getElementById('base-display').innerText = d.files["base_logistica.txt"].content;
                    document.getElementById('sync-status').innerText = "SINCRO: " + new Date().toLocaleTimeString();
                }
            } catch (e) { document.getElementById('sync-status').innerText = "ERROR RED"; }
        }

        function tick() {
            document.querySelectorAll('.cronos').forEach(el => {
                let l = el.dataset.last; if(!l) return;
                let d = Math.floor((Date.now() - l)/1000);
                let m = Math.floor(d/60), s = d % 60;
                el.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(el.dataset.on === 'true' && m >= parseInt(el.dataset.alarm)) {
                    el.classList.add('text-red-500'); if(s === 0) sonarPatron();
                } else el.classList.remove('text-red-500');
            });
            setTimeout(tick, 1000);
        }

        function copyWA() {
            const f = document.getElementById('calendar-filter').value;
            let txt = `*REPORTE LOGÍSTICA - ${f}*\n\n`;
            rutas.forEach(ruta => {
                const regs = (historial[f] || []).filter(r => r.ruta === ruta.n);
                if(regs.length) {
                    txt += `*[${ruta.n}]*\n` + regs.map(r => `• #${r.unidad} - ${new Date(r.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`).join('\n') + '\n\n';
                }
            });
            navigator.clipboard.writeText(txt); alert("Copiado");
        }

        function descargarNotas() {
            const blob = new Blob([document.getElementById('notas-input').value], {type: "text/plain"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `notas_${getFechaLocal()}.txt`; a.click();
        }

        function exportarBackup() {
            const blob = new Blob([JSON.stringify({rutas, historial})], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `backup_${getFechaLocal()}.json`; a.click();
        }

        function borrarTodo() { if(confirm("¿Borrar historial?")) { historial = {}; save(); } }

        window.onload = () => {
            document.getElementById('calendar-filter').value = getFechaLocal();
            document.getElementById('notas-input').value = localStorage.getItem('log_notas') || '';
            if(localStorage.getItem('log_dark') === 'true') {
                document.body.classList.add('dark');
                document.getElementById('dark-toggle').checked = true;
            }
            document.getElementById('notas-input').oninput = (e) => localStorage.setItem('log_notas', e.target.value);
            fetchCloudData(); render(); tick();
        };
    </script>
</body>
</html>
